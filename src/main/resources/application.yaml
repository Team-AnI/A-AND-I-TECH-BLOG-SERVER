spring:
  application:
    name: tech.blog
  profiles:
    default: local
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: v1
        url: /v3/api-docs/v1
      - name: v2
        url: /v3/api-docs/v2

app:
  api-log:
    env: ${APP_ENV:${spring.profiles.active:${spring.profiles.default:local}}}
    service-name: blog
    domain-code: 6
    service-version: ${APP_SERVICE_VERSION:0.0.1-SNAPSHOT}
    instance-id: ${HOSTNAME:${random.uuid}}
  share:
    public-base-url: ${APP_SHARE_PUBLIC_BASE_URL:http://localhost:8080}
    default-og-image-url: ${APP_SHARE_DEFAULT_OG_IMAGE_URL:http://localhost:8080/og-default.png}
    default-description: ${APP_SHARE_DEFAULT_DESCRIPTION:A&I 기술 블로그}
    cache:
      max-age-seconds: ${APP_SHARE_CACHE_MAX_AGE_SECONDS:60}
      shared-max-age-seconds: ${APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS:300}
      stale-while-revalidate-seconds: ${APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS:600}
  auth:
    jwt:
      issuer-uri: ${APP_AUTH_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_AUTH_JWT_JWK_SET_URI:}
      shared-secret: ${AUTH_JWT_SECRET:${APP_AUTH_JWT_SHARED_SECRET:}}
      user-id-claim: ${APP_AUTH_JWT_USER_ID_CLAIM:userId}
  user-events:
    enabled: false
    queue-url: ""
    region: us-east-1
    wait-time-seconds: 20
    max-messages: 10
    poll-delay-ms: 1000
