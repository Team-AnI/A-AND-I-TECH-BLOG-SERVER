services:
  postgres:
    image: postgres:16-alpine
    container_name: tech-blog-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tech_blog}
      POSTGRES_USER: ${POSTGRES_USER:-tech_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tech_blog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tech-blog:
    image: ${IMAGE_URI:-tech-blog:local}
    container_name: tech-blog
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-tech_blog}
      SPRING_R2DBC_USERNAME: ${POSTGRES_USER:-tech_blog}
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD:-tech_blog}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tech_blog}
      SPRING_FLYWAY_USER: ${POSTGRES_USER:-tech_blog}
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-tech_blog}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      APP_AUTH_JWT_ISSUER_URI: ${APP_AUTH_JWT_ISSUER_URI:-}
      APP_AUTH_JWT_JWK_SET_URI: ${APP_AUTH_JWT_JWK_SET_URI:-}
      APP_AUTH_JWT_SHARED_SECRET: ${APP_AUTH_JWT_SHARED_SECRET:-}
      APP_AUTH_JWT_USER_ID_CLAIM: ${APP_AUTH_JWT_USER_ID_CLAIM:-userId}
      APP_S3_BUCKET: ${APP_S3_BUCKET:-}
      APP_S3_REGION: ${APP_S3_REGION:-}
      APP_S3_PUBLIC_BASE_URL: ${APP_S3_PUBLIC_BASE_URL:-}
      APP_SHARE_PUBLIC_BASE_URL: ${APP_SHARE_PUBLIC_BASE_URL:-http://localhost:8080}
      APP_SHARE_DEFAULT_OG_IMAGE_URL: ${APP_SHARE_DEFAULT_OG_IMAGE_URL:-http://localhost:8080/og-default.png}
      APP_SHARE_DEFAULT_DESCRIPTION: ${APP_SHARE_DEFAULT_DESCRIPTION:-A&I tech blog}
      APP_SHARE_CACHE_MAX_AGE_SECONDS: ${APP_SHARE_CACHE_MAX_AGE_SECONDS:-60}
      APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS: ${APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS:-300}
      APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS: ${APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS:-600}
      APP_USER_EVENTS_ENABLED: ${APP_USER_EVENTS_ENABLED:-false}
      APP_USER_EVENTS_QUEUE_URL: ${APP_USER_EVENTS_QUEUE_URL:-}
      APP_USER_EVENTS_REGION: ${APP_USER_EVENTS_REGION:-us-east-1}
      APP_USER_EVENTS_WAIT_TIME_SECONDS: ${APP_USER_EVENTS_WAIT_TIME_SECONDS:-20}
      APP_USER_EVENTS_MAX_MESSAGES: ${APP_USER_EVENTS_MAX_MESSAGES:-10}
      APP_USER_EVENTS_POLL_DELAY_MS: ${APP_USER_EVENTS_POLL_DELAY_MS:-1000}
      AWS_REGION: ${APP_S3_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${APP_S3_REGION:-us-east-1}

volumes:
  postgres_data:
