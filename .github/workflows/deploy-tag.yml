name: Deploy Tagged Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      APP_DIR: ${{ vars.APP_DIR || '/opt/tech-blog' }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'tech_blog' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'tech_blog' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      APP_AUTH_JWT_SHARED_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      APP_S3_BUCKET: ${{ secrets.APP_S3_BUCKET }}
      APP_S3_REGION: ${{ secrets.APP_S3_REGION }}
      APP_S3_PUBLIC_BASE_URL: ${{ secrets.APP_S3_PUBLIC_BASE_URL }}
      APP_USER_EVENTS_ENABLED: ${{ vars.APP_USER_EVENTS_ENABLED || 'false' }}
      APP_USER_EVENTS_QUEUE_URL: ${{ secrets.APP_USER_EVENTS_QUEUE_URL }}
      APP_USER_EVENTS_REGION: ${{ vars.APP_USER_EVENTS_REGION || vars.AWS_REGION || 'us-east-1' }}
      APP_USER_EVENTS_WAIT_TIME_SECONDS: ${{ vars.APP_USER_EVENTS_WAIT_TIME_SECONDS || '20' }}
      APP_USER_EVENTS_MAX_MESSAGES: ${{ vars.APP_USER_EVENTS_MAX_MESSAGES || '10' }}
      APP_USER_EVENTS_POLL_DELAY_MS: ${{ vars.APP_USER_EVENTS_POLL_DELAY_MS || '1000' }}
      APP_SHARE_PUBLIC_BASE_URL: ${{ vars.APP_SHARE_PUBLIC_BASE_URL || '' }}
      APP_SHARE_DEFAULT_OG_IMAGE_URL: ${{ vars.APP_SHARE_DEFAULT_OG_IMAGE_URL || '' }}
      APP_SHARE_DEFAULT_DESCRIPTION: ${{ vars.APP_SHARE_DEFAULT_DESCRIPTION || '' }}
      APP_SHARE_CACHE_MAX_AGE_SECONDS: ${{ vars.APP_SHARE_CACHE_MAX_AGE_SECONDS || '60' }}
      APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS: ${{ vars.APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS || '300' }}
      APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS: ${{ vars.APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS || '600' }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || 'http://127.0.0.1:8080/health' }}
      APP_CONTAINER_NAME: tech-blog
      APP_SERVICE_NAME: tech-blog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: ${GITHUB_REF_NAME}"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Prepare remote app directory
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.APP_DIR }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: ${{ vars.AWS_PORT || '22' }}
          envs: APP_DIR
          script: |
            set -Eeuo pipefail
            mkdir -p "${APP_DIR}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: ${{ vars.AWS_PORT || '22' }}
          source: docker-compose.yml
          target: ${{ env.APP_DIR }}
          overwrite: true

      - name: Deploy on instance via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}
          DEPLOY_TAG: ${{ github.ref_name }}
          APP_DIR: ${{ env.APP_DIR }}
          APP_CONTAINER_NAME: ${{ env.APP_CONTAINER_NAME }}
          APP_SERVICE_NAME: ${{ env.APP_SERVICE_NAME }}
          HEALTHCHECK_URL: ${{ env.HEALTHCHECK_URL }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          AUTH_JWT_SECRET: ${{ env.AUTH_JWT_SECRET }}
          APP_AUTH_JWT_SHARED_SECRET: ${{ env.APP_AUTH_JWT_SHARED_SECRET }}
          APP_S3_BUCKET: ${{ env.APP_S3_BUCKET }}
          APP_S3_REGION: ${{ env.APP_S3_REGION }}
          APP_S3_PUBLIC_BASE_URL: ${{ env.APP_S3_PUBLIC_BASE_URL }}
          APP_USER_EVENTS_ENABLED: ${{ env.APP_USER_EVENTS_ENABLED }}
          APP_USER_EVENTS_QUEUE_URL: ${{ env.APP_USER_EVENTS_QUEUE_URL }}
          APP_USER_EVENTS_REGION: ${{ env.APP_USER_EVENTS_REGION }}
          APP_USER_EVENTS_WAIT_TIME_SECONDS: ${{ env.APP_USER_EVENTS_WAIT_TIME_SECONDS }}
          APP_USER_EVENTS_MAX_MESSAGES: ${{ env.APP_USER_EVENTS_MAX_MESSAGES }}
          APP_USER_EVENTS_POLL_DELAY_MS: ${{ env.APP_USER_EVENTS_POLL_DELAY_MS }}
          APP_SHARE_PUBLIC_BASE_URL: ${{ env.APP_SHARE_PUBLIC_BASE_URL }}
          APP_SHARE_DEFAULT_OG_IMAGE_URL: ${{ env.APP_SHARE_DEFAULT_OG_IMAGE_URL }}
          APP_SHARE_DEFAULT_DESCRIPTION: ${{ env.APP_SHARE_DEFAULT_DESCRIPTION }}
          APP_SHARE_CACHE_MAX_AGE_SECONDS: ${{ env.APP_SHARE_CACHE_MAX_AGE_SECONDS }}
          APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS: ${{ env.APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS }}
          APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS: ${{ env.APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: ${{ vars.AWS_PORT || '22' }}
          envs: AWS_REGION,IMAGE_URI,DEPLOY_TAG,APP_DIR,APP_CONTAINER_NAME,APP_SERVICE_NAME,HEALTHCHECK_URL,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,AUTH_JWT_SECRET,APP_AUTH_JWT_SHARED_SECRET,APP_S3_BUCKET,APP_S3_REGION,APP_S3_PUBLIC_BASE_URL,APP_USER_EVENTS_ENABLED,APP_USER_EVENTS_QUEUE_URL,APP_USER_EVENTS_REGION,APP_USER_EVENTS_WAIT_TIME_SECONDS,APP_USER_EVENTS_MAX_MESSAGES,APP_USER_EVENTS_POLL_DELAY_MS,APP_SHARE_PUBLIC_BASE_URL,APP_SHARE_DEFAULT_OG_IMAGE_URL,APP_SHARE_DEFAULT_DESCRIPTION,APP_SHARE_CACHE_MAX_AGE_SECONDS,APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS,APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS
          script: |
            set -Eeuo pipefail
            : "${APP_AUTH_JWT_SHARED_SECRET:?APP_AUTH_JWT_SHARED_SECRET is required}"
            : "${APP_S3_BUCKET:?APP_S3_BUCKET is required}"
            : "${APP_S3_REGION:?APP_S3_REGION is required}"
            if [[ "${APP_USER_EVENTS_ENABLED}" == "true" ]]; then
              : "${APP_USER_EVENTS_QUEUE_URL:?APP_USER_EVENTS_QUEUE_URL is required when APP_USER_EVENTS_ENABLED=true}"
            fi

            if [[ -n "${APP_AUTH_JWT_SHARED_SECRET:-}" ]]; then
              echo "APP_AUTH_JWT_SHARED_SECRET is configured"
            else
              echo "APP_AUTH_JWT_SHARED_SECRET is missing"
              exit 1
            fi
            if [[ -n "${AUTH_JWT_SECRET:-}" ]]; then
              echo "AUTH_JWT_SECRET legacy alias is configured"
            else
              echo "AUTH_JWT_SECRET legacy alias is missing"
            fi

            command -v aws >/dev/null
            command -v curl >/dev/null
            command -v docker >/dev/null

            COMPOSE_PROJECT_NAME="tech-blog"
            COMPOSE_FILE="${APP_DIR}/docker-compose.yml"
            LAST_SUCCESSFUL_MARKER="${APP_DIR}/last-successful-image"
            PREVIOUS_IMAGE_MARKER="${APP_DIR}/previous-image"
            CURRENT_DEPLOY_TAG_MARKER="${APP_DIR}/current-deploy-tag"
            NEW_IMAGE="${IMAGE_URI}"
            CURRENT_IMAGE="$(docker inspect --format='{{.Config.Image}}' "${APP_CONTAINER_NAME}" 2>/dev/null || true)"
            ROLLBACK_IMAGE="$(cat "${LAST_SUCCESSFUL_MARKER}" 2>/dev/null || true)"

            if [[ -z "${ROLLBACK_IMAGE}" ]]; then
              ROLLBACK_IMAGE="${CURRENT_IMAGE}"
            fi
            if [[ -z "${ROLLBACK_IMAGE}" ]]; then
              echo "No rollback image found. Stop deployment."
              exit 1
            fi
            if [[ ! -f "${COMPOSE_FILE}" ]]; then
              echo "Missing compose file: ${COMPOSE_FILE}"
              exit 1
            fi

            printf '%s\n' "${ROLLBACK_IMAGE}" > "${PREVIOUS_IMAGE_MARKER}"
            cd "${APP_DIR}"

            export COMPOSE_PROJECT_NAME
            export IMAGE_URI="${NEW_IMAGE}"
            export POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD AUTH_JWT_SECRET APP_AUTH_JWT_SHARED_SECRET
            export APP_S3_BUCKET APP_S3_REGION APP_S3_PUBLIC_BASE_URL
            export APP_USER_EVENTS_ENABLED APP_USER_EVENTS_QUEUE_URL APP_USER_EVENTS_REGION
            export APP_USER_EVENTS_WAIT_TIME_SECONDS APP_USER_EVENTS_MAX_MESSAGES APP_USER_EVENTS_POLL_DELAY_MS
            export APP_SHARE_PUBLIC_BASE_URL APP_SHARE_DEFAULT_OG_IMAGE_URL APP_SHARE_DEFAULT_DESCRIPTION
            export APP_SHARE_CACHE_MAX_AGE_SECONDS APP_SHARE_CACHE_SHARED_MAX_AGE_SECONDS APP_SHARE_CACHE_STALE_WHILE_REVALIDATE_SECONDS

            check_health() {
              for i in {1..30}; do
                if curl -fsS "${HEALTHCHECK_URL}" >/dev/null; then
                  echo "healthcheck passed"
                  return 0
                fi
                sleep 5
              done

              echo "healthcheck failed"
              return 1
            }

            public_v2_base_url() {
              local base_url

              base_url="${HEALTHCHECK_URL%/health}"
              if [[ "${base_url}" == "${HEALTHCHECK_URL}" ]]; then
                base_url="http://127.0.0.1:8080"
              fi
              printf '%s' "${base_url}"
            }

            check_public_v2_api_request() {
              local base_url
              local path
              local label
              local authenticate_header
              local timestamp
              local response

              path="$1"
              label="$2"
              authenticate_header="${3:-}"
              base_url="$(public_v2_base_url)"

              for i in {1..30}; do
                timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                if [[ -n "${authenticate_header}" ]]; then
                  response="$(curl -fsS \
                    -H "deviceOS: SERVER" \
                    -H "timestamp: ${timestamp}" \
                    -H "Authenticate: ${authenticate_header}" \
                    "${base_url}${path}" 2>/dev/null || true)"
                else
                  response="$(curl -fsS \
                    -H "deviceOS: SERVER" \
                    -H "timestamp: ${timestamp}" \
                    "${base_url}${path}" 2>/dev/null || true)"
                fi

                if printf '%s' "${response}" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
                  echo "public v2 api smoke passed: ${label} ${path}"
                  return 0
                fi

                sleep 5
              done

              echo "public v2 api smoke failed: ${label} ${path}"
              return 1
            }

            check_public_v2_api() {
              local path

              for path in "/v2/posts?page=0&size=1" "/v2/blogs?page=0&size=1"; do
                if ! check_public_v2_api_request "${path}" "without optional auth"; then
                  return 1
                fi
                if ! check_public_v2_api_request "${path}" "with invalid optional auth" "Bearer broken-token-for-public-smoke"; then
                  return 1
                fi
              done

              return 0
            }

            verify_db_tables() {
              for i in {1..30}; do
                if docker exec tech-blog-postgres psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc "SELECT to_regclass('public.posts') IS NOT NULL AND to_regclass('public.users') IS NOT NULL;" | grep -q "t"; then
                  echo "Verified: public.posts and public.users tables exist"
                  return 0
                fi
                sleep 2
              done

              echo "ERROR: public.posts/public.users table does not exist after deploy"
              return 1
            }

            rollback() {
              echo "New deployment failed. Rolling back to ${ROLLBACK_IMAGE}"
              export IMAGE_URI="${ROLLBACK_IMAGE}"
              if ! docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans "${APP_SERVICE_NAME}"; then
                echo "Rollback container start failed"
                docker logs --tail 200 "${APP_CONTAINER_NAME}" || true
                return 1
              fi

              if ! check_public_v2_api; then
                echo "Rollback public v2 api smoke failed"
                docker logs --tail 200 "${APP_CONTAINER_NAME}" || true
                return 1
              fi

              echo "Rollback completed"
              return 0
            }

            ECR_REGISTRY="$(echo "${IMAGE_URI}" | cut -d'/' -f1)"
            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            docker compose -f "${COMPOSE_FILE}" config >/dev/null
            docker compose -f "${COMPOSE_FILE}" pull "${APP_SERVICE_NAME}"
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans "${APP_SERVICE_NAME}"

            if ! check_health || ! verify_db_tables || ! check_public_v2_api; then
              rollback
              exit 1
            fi

            printf '%s\n' "${NEW_IMAGE}" > "${LAST_SUCCESSFUL_MARKER}"
            printf '%s\n' "${DEPLOY_TAG}" > "${CURRENT_DEPLOY_TAG_MARKER}"
            echo "Deployment succeeded"

            docker image prune -f --filter "until=72h"
